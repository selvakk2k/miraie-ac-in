name: Bug Report
description: Report a bug in the underlying Python library
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to report bugs in the `miraie-ac-in` library.
  - type: input
    id: model_number
    attributes:
      label: AC Model Number
      description: The exact model number of your AC unit.
      placeholder: e.g. CS-CU-NU18YKY5W
    validations:
      required: true
  - type: input
    id: firmware_version
    attributes:
      label: AC Firmware Version
      description: The firmware version from the MirAIe app (if known).
    validations:
      required: false
  - type: input
    id: library_version
    attributes:
      label: Library Version
      description: The version of the `miraie-ac-in` package.
      placeholder: e.g. v1.0.6
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: code_snippet
    attributes:
      label: Code Snippet / Steps to Reproduce
      description: Python code snippet demonstrating the bug if applicable.
      render: python
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Debug / Network Logs
      description: Raw MQTT or API payload logs (redact personal info like username/password).
      render: shell
    validations:
      required: false
